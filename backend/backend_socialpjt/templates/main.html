<!-- templates/main.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Main Page</title>
</head>
<body>
    {% if user.is_authenticated %}
        <h1>환영합니다, {{ user.email }} 님!</h1>
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit">로그아웃</button>
        </form>
    {% else %}
        <h1>로그인되지 않았습니다.</h1>
        <a href="{% url 'login' %}">로그인하기</a>
    {% endif %}
</body>
</html>
