<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}복지 뉴스{% endblock %}</title>
    <style>
        :root {
            font-family: 'Noto Sans KR', Arial, sans-serif;
            --primary: #0f4c81;
            --accent: #eef4fb;
            --border: #d5e0ef;
        }
        body {
            margin: 0;
            background: linear-gradient(135deg, #f7fbff, #eef4fb);
            min-height: 100vh;
        }
        header {
            background: var(--primary);
            color: #fff;
            padding: 1rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        header h1 { margin: 0; font-size: 1.5rem; }
        nav a {
            color: #d9e7ff;
            margin-right: 1rem;
            text-decoration: none;
            font-weight: 500;
        }
        main {
            max-width: 960px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        .card {
            background: #fff;
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 1.25rem;
            box-shadow: 0 18px 35px rgba(15, 76, 129, 0.09);
        }
        .muted { color: #5f7087; font-size: 0.9rem; }
        .stack { display: flex; flex-direction: column; gap: 1rem; }
        .btn {
            border-radius: 8px;
            padding: 0.55rem 1.1rem;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
        }
        .btn.primary { background: var(--primary); color: #fff; }
        .btn.ghost { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        form { display: flex; flex-direction: column; gap: 0.75rem; }
        textarea {
            border-radius: 8px;
            border: 1px solid var(--border);
            padding: 0.65rem 0.8rem;
            font-size: 1rem;
        }
        a.card-link { color: inherit; text-decoration: none; }
        @media (max-width: 640px) {
            main { padding: 1rem; }
            nav a { display: inline-block; margin-bottom: 0.25rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>복지 뉴스</h1>
        <nav>
            <a href="{% url 'news:news_list' %}">뉴스 목록</a>
            <a href="{% url 'community:community_list' %}">커뮤니티</a>
            <a href="{% url 'main' %}">메인으로</a>
        </nav>
    </header>
    <main>
        {% if messages %}
            <ul class="stack" style="list-style:none;padding:0;margin:0 0 1rem 0;">
                {% for message in messages %}
                    <li class="card" style="padding:0.65rem 0.9rem;">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    {% if failure_message %}
        <script>
            (function() {
                const message = "{{ failure_message|escapejs }}";
                if (message) {
                    alert(message);
                }
            })();
        </script>
    {% endif %}
</body>
</html>
